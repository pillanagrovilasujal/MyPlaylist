<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyMusic – Playlist</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<style>
    /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #f0f9ff, #fefce8); /* light blue → cream */
    color: #333;
}

/* Header */
header {
    background-color: #e0f2fe; /* light sky blue */
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #bae6fd;
}

header h1 {
    color: #0369a1;
    margin-bottom: 8px;
}

/* Navigation */
nav a {
    text-decoration: none;
    margin: 0 12px;
    color: #0284c7;
    font-weight: 600;
}

nav a:hover {
    color: #075985;
    border-bottom: 2px solid #075985;
}

/* Box */
.box {
    background-color: #ffffff;
    width: 420px;
    margin: 50px auto;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 10px 18px rgba(0, 0, 0, 0.1);
}

/* Headings */
.box h2 {
    text-align: center;
    color: #0f172a;
    margin-bottom: 20px;
}

/* Form */
form {
    font-size: 15px;
}

/* Inputs & Select */
input[type="text"],
select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5f5;
    margin-top: 5px;
}

/* Submit Button */
input[type="submit"] {
    width: 100%;
    background-color: #38bdf8;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

input[type="submit"]:hover {
    background-color: #0284c7;
}

/* Footer */
footer {
    background-color: #e0f2fe;
    text-align: center;
    padding: 15px;
    margin-top: 60px;
    color: #075985;
}
</style>
<header>
    <h1>MyMusic</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="playlist.html">Playlist</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="box">
    <h2>Create Playlist</h2>
<form action="successful.html">
    
        Playlist Name:<br>
        <input type="text"><br><br>

        Select Song:<br>
        <select>
            <option>Blinding Lights</option>
            <option>Shape of You</option>
            <option>Levitating</option>
        </select><br><br>

        <input type="submit" value="Add to Playlist">
    </form>
</section>

<footer>
    <p>© 2025 MyMusic</p>
</footer>

</body>
</html>
