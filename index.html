<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyMusic – Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<style>
    /* Reset default spacing */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Page background */
body {
    font-family: Arial, sans-serif;
    background-color: #f2f7ff;   /* very light blue */
    color: #333;
}

/* Header styling */
header {
    background-color: #dbeafe;   /* light sky blue */
    text-align: center;
    padding: 25px;
    border-bottom: 2px solid #bfdbfe;
}

header h1 {
    color: #1e3a8a;              /* soft dark blue */
    margin-bottom: 8px;
}

header p {
    color: #475569;
    margin-bottom: 15px;
}

/* Navigation menu */
nav a {
    text-decoration: none;
    margin: 0 12px;
    color: #2563eb;
    font-weight: bold;
}

nav a:hover {
    color: #1e40af;
    text-decoration: underline;
}

/* Main content box */
.box {
    background-color: #ffffff;
    width: 60%;
    margin: 40px auto;
    padding: 30px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Section heading */
.box h2 {
    color: #1e293b;
    margin-bottom: 15px;
}

/* Paragraph */
.box p {
    color: #475569;
    margin-bottom: 20px;
}

/* Image styling */
.box img {
    border-radius: 10px;
    border: 2px solid #e5e7eb;
}

/* Footer */
footer {
    background-color: #e0f2fe;   /* very light blue */
    text-align: center;
    padding: 15px;
    margin-top: 50px;
    color: #334155;
}
</style>
<header>
    <h1>MyMusic</h1>
    <p>Listen to your favourite songs anytime</p>
    <nav>
        <a href="index.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="playlist.html">Playlist</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="box">
    <h2>About MyMusic</h2>
    <p>MyMusic is a simple online music streaming website.</p>

    <img src="https://img.freepik.com/premium-vector/melodic-mark-vector-logo-headphones-sound-sphere-headphone-emblem-vector_974322-11032.jpg"
         alt="Music Logo" width="220">
</section>

<footer>
    <p>© 2025 MyMusic</p>
</footer>

</body>
</html>
