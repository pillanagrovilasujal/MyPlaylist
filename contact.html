<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyMusic – Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<style>
    /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #fdf2f8, #f0f9ff); /* light pink → light blue */
    color: #374151;
}

/* HEADER */
header {
    background-color: #e0f2fe;
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #bae6fd;
}

header h1 {
    color: #0369a1;
    margin-bottom: 8px;
}

/* NAVIGATION */
nav a {
    text-decoration: none;
    margin: 0 12px;
    color: #0284c7;
    font-weight: 600;
}

nav a:hover {
    color: #075985;
    border-bottom: 2px solid #075985;
}

/* CONTACT BOX */
.box {
    background-color: #ffffff;
    width: 420px;
    margin: 70px auto;
    padding: 30px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12);
}

/* HEADINGS */
.box h2 {
    color: #0f172a;
    margin-bottom: 15px;
}

/* TEXT */
.box p {
    font-size: 16px;
    margin: 10px 0;
}

/* FOOTER */
footer {
    background-color: #e0f2fe;
    text-align: center;
    padding: 15px;
    margin-top: 80px;
    color: #075985;
}
</style>
<header>
    <h1>MyMusic</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="playlist.html">Playlist</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="box">
    <h2>Contact Us</h2>
    <p>Email: mymusic@email.com</p>
    <p>Website: www.mymusic.com</p>
</section>

<footer>
    <p>© 2025 MyMusic</p>
</footer>

</body>
</html>
